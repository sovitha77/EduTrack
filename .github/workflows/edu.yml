name: Django CI

on:
 push:

jobs:
 test:
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - uses: actions/setup-python@v5
       with:
         python-version: "3.10"

     - name: Install Dependencies
       run: |
         pip install -r requirements.txt

     - name: Run Django Tests
       run: |
         python manage.py test

